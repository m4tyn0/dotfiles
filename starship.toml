# ─── brutalist minimal prompt — tokyo night palette ───────────────────────────
format = "$directory$git_branch$git_status$character"
add_newline = false

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol = "[❯](bold #f7768e)"
vimcmd_symbol = "[❮](bold #7aa2f7)"

[directory]
style = "bold #c0caf5"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "
read_only = " 󰌾"
read_only_style = "bold #f7768e"

[git_branch]
symbol = ""
style = "bold #e0af68"
format = "[$symbol$branch]($style) "
truncation_length = 20

[git_status]
style = "bold #f7768e"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "!"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "~"
staged = "+"
deleted = "-"

# ─── disabled noise ────────────────────────────────────────────────────────────
[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[golang]
disabled = true

[rust]
disabled = true

[cmd_duration]
disabled = true
